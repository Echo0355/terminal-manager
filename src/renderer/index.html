<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Manager</title>
    <style>
      /* ── CSS 变量：深色主题（VS Code Dark+） ── */
      :root {
        --bg-base: #1e1e1e;
        --bg-surface: #252526;
        --bg-elevated: #2d2d2d;
        --bg-hover: #2a2d2e;
        --bg-hover-strong: #383838;
        --bg-activitybar: #333333;
        --border-default: #3c3c3c;
        --border-subtle: #505050;
        --border-light: #474747;
        --text-primary: #cccccc;
        --text-secondary: #bbbbbb;
        --text-muted: #969696;
        --text-disabled: #888888;
        --text-bright: #ffffff;
        --text-loading: #d4d4d4;
        --accent: #007acc;
        --accent-hover: #005a9e;
        --accent-glow: rgba(0, 120, 204, 0.3);
        --activitybar-fg: #858585;
        --activitybar-fg-active: #ffffff;
        --activitybar-badge: #c5c5c5;
        --color-error: #f44747;
        --color-error-bg: #3a1d1d;
        --color-error-bg-strong: #5a1d1d;
        --color-error-bg-hover: #7a2d2d;
        --color-warning: #d7ba7d;
        --color-warning-bg: #3a3a1d;
        --color-success: #6a9955;
        --color-success-bg: #1d3a1d;
        --color-info-bg: #1a2a3a;
        --scrollbar-thumb: #424242;
        --scrollbar-thumb-hover: #555555;
        --overlay-bg: rgba(0, 0, 0, 0.5);
        --shadow-dialog: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-notification: 0 4px 16px rgba(0, 0, 0, 0.3);
        --statusbar-bg: #333333;
        --statusbar-fg: #cccccc;
        --statusbar-hover: rgba(255, 255, 255, 0.08);
        --statusbar-separator: rgba(255, 255, 255, 0.12);
        --statusbar-accent: #4fc1ff;
        --tab-separator: #252526;
      }

      /* ── CSS 变量：浅色主题 ── */
      html.light,
      html.light body {
        --bg-base: #ffffff;
        --bg-surface: #f3f3f3;
        --bg-elevated: #ffffff;
        --bg-hover: #e8e8e8;
        --bg-hover-strong: #d4d4d4;
        --bg-activitybar: #2c2c2c;
        --border-default: #e0e0e0;
        --border-subtle: #c8c8c8;
        --border-light: #d4d4d4;
        --text-primary: #333333;
        --text-secondary: #555555;
        --text-muted: #888888;
        --text-disabled: #aaaaaa;
        --text-bright: #000000;
        --text-loading: #555555;
        --accent: #007acc;
        --accent-hover: #005a9e;
        --accent-glow: rgba(0, 120, 204, 0.2);
        --activitybar-fg: #858585;
        --activitybar-fg-active: #ffffff;
        --activitybar-badge: #c5c5c5;
        --color-error: #cd3131;
        --color-error-bg: #fde8e8;
        --color-error-bg-strong: #f5c6c6;
        --color-error-bg-hover: #f0a0a0;
        --color-warning: #bf8803;
        --color-warning-bg: #fff8e1;
        --color-success: #388e3c;
        --color-success-bg: #e8f5e9;
        --color-info-bg: #e3f2fd;
        --scrollbar-thumb: #c1c1c1;
        --scrollbar-thumb-hover: #a8a8a8;
        --overlay-bg: rgba(0, 0, 0, 0.3);
        --shadow-dialog: 0 8px 32px rgba(0, 0, 0, 0.15);
        --shadow-notification: 0 4px 16px rgba(0, 0, 0, 0.12);
        --statusbar-bg: #007acc;
        --statusbar-fg: #ffffff;
        --statusbar-hover: rgba(255, 255, 255, 0.15);
        --statusbar-separator: rgba(255, 255, 255, 0.25);
        --statusbar-accent: #ffffff;
        --tab-separator: #e0e0e0;
        --bg-activitybar: #333333;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-base);
        font-family: 'Segoe UI', 'Microsoft YaHei', 'Cascadia Code', Consolas, monospace;
        color: var(--text-primary);
        font-size: 13px;
      }

      /* ── 全局滚动条（VS Code 风格） ── */
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: transparent;
      }

      *::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border: 3px solid transparent;
        background-clip: content-box;
        border-radius: 5px;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
        border-width: 2px;
      }

      *::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* 标签栏：细滚动条 */
      #tab-bar::-webkit-scrollbar {
        height: 4px;
      }

      #tab-bar::-webkit-scrollbar-thumb {
        border-width: 0;
        border-radius: 2px;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ── 标签栏（顶部，跨全宽） ── */
      #tab-bar {
        display: flex;
        align-items: stretch;
        height: 35px;
        background: var(--bg-surface);
        padding: 0;
        overflow-x: auto;
        overflow-y: hidden;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border-default);
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 35px;
        padding: 0 12px;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--bg-elevated);
        border: none;
        border-right: 1px solid var(--tab-separator);
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
        position: relative;
        transition: background 0.1s ease, color 0.1s ease;
        min-width: 100px;
      }

      .tab:hover {
        background: var(--bg-hover-strong);
      }

      .tab:active {
        opacity: 0.85;
      }

      .tab.active {
        background: var(--bg-base);
        color: var(--text-bright);
        border-right-color: var(--tab-separator);
      }

      .tab.active::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--accent);
      }

      .tab-title {
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        pointer-events: none;
      }

      .tab-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1;
        opacity: 0;
        color: var(--text-muted);
        transition: opacity 0.1s ease, background 0.1s ease, color 0.1s ease;
        flex-shrink: 0;
      }

      .tab:hover .tab-close {
        opacity: 0.7;
      }

      .tab-close:hover {
        opacity: 1 !important;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
      }

      #tab-add {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 35px;
        height: 35px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 16px;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.1s ease, color 0.1s ease;
      }

      #tab-add:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      /* ── 主内容区 ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── 活动栏（VS Code 标志性左侧图标栏） ── */
      #activity-bar {
        width: 48px;
        background: var(--bg-activitybar);
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        padding: 4px 0;
        border-right: 1px solid var(--border-default);
      }

      .activity-btn {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--activitybar-fg);
        cursor: pointer;
        position: relative;
        font-size: 22px;
        transition: color 0.1s ease;
      }

      .activity-btn:hover {
        color: var(--activitybar-fg-active);
      }

      .activity-btn.active {
        color: var(--activitybar-fg-active);
      }

      .activity-btn.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: var(--activitybar-fg-active);
      }

      .activity-btn .activity-badge {
        position: absolute;
        top: 8px;
        right: 6px;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        font-size: 9px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }

      .activity-spacer {
        flex: 1;
      }

      /* ── 侧边栏 ── */
      #sidebar {
        width: 260px;
        min-width: 0;
        background: var(--bg-surface);
        border-right: 1px solid var(--border-default);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
        position: relative;
        transition: width 0.2s ease;
      }

      #sidebar.collapsed {
        width: 0;
        border-right: none;
      }

      /* 侧边栏右侧拖拽区域 */
      #sidebar::after {
        content: '';
        position: absolute;
        top: 0;
        right: -3px;
        width: 6px;
        height: 100%;
        cursor: col-resize;
        z-index: 20;
      }

      #sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px 0 20px;
        height: 35px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        flex-shrink: 0;
      }

      #sidebar-header .sidebar-actions {
        display: flex;
        gap: 2px;
      }

      #sidebar-header button {
        background: transparent;
        border: none;
        color: var(--text-muted);
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1;
        transition: background 0.1s ease, color 0.1s ease;
      }

      #sidebar-header button:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      #project-list {
        flex: 1;
        overflow-y: auto;
        padding: 0;
      }

      .project-item {
        display: flex;
        align-items: center;
        padding: 2px 8px 2px 12px;
        height: 22px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        position: relative;
        transition: background 0.08s ease;
      }

      .project-item:hover {
        background: var(--bg-hover);
      }

      .project-item .project-icon {
        margin-right: 6px;
        font-size: 14px;
        flex-shrink: 0;
        width: 16px;
        text-align: center;
      }

      .project-item .project-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .project-item .project-actions {
        display: none;
        gap: 0;
        margin-left: auto;
      }

      .project-item:hover .project-actions {
        display: flex;
      }

      .project-action-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 4px;
        font-size: 12px;
        line-height: 1;
        transition: background 0.1s ease, color 0.1s ease;
      }

      .project-action-btn:hover {
        background: var(--bg-hover-strong);
        color: var(--text-primary);
      }

      .project-action-btn.danger:hover {
        background: var(--color-error-bg-strong);
        color: var(--color-error);
      }

      #sidebar-empty {
        padding: 20px 16px;
        font-size: 12px;
        color: var(--text-disabled);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      #sidebar-empty::before {
        content: '\1F4C2';
        font-size: 24px;
        opacity: 0.4;
        display: block;
        margin-bottom: 2px;
      }

      /* ── 终端区域 ── */
      #terminal-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: var(--bg-base);
      }

      .tab-content {
        position: absolute;
        inset: 0;
      }

      /* ── Pane 样式 ── */
      .pane {
        width: 100%;
        height: 100%;
        position: relative;
        border: 1px solid transparent;
        transition: border-color 0.1s ease, opacity 0.1s ease;
      }

      .pane.focused {
        border-color: var(--border-subtle);
      }

      .pane:not(.focused) {
        opacity: 0.75;
      }

      .pane .xterm {
        height: 100%;
      }

      .pane .xterm-viewport {
        overflow-y: auto !important;
      }

      .pane .xterm-viewport::-webkit-scrollbar {
        width: 10px;
      }

      .pane .xterm-viewport::-webkit-scrollbar-track {
        background: transparent;
      }

      .pane .xterm-viewport::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border: 3px solid var(--bg-base);
        background-clip: content-box;
        border-radius: 5px;
      }

      .pane .xterm-viewport::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
        border-width: 2px;
      }

      /* ── 布局容器 ── */
      .layout-container {
        width: 100%;
        height: 100%;
      }

      .layout-child {
        position: relative;
        overflow: hidden;
      }

      /* ── 分割线 ── */
      .pane-splitter {
        flex-shrink: 0;
        position: relative;
        z-index: 10;
        background: var(--border-default);
        opacity: 0.6;
        transition: background 0.1s ease, opacity 0.1s ease;
      }

      .pane-splitter:hover,
      .pane-splitter.dragging {
        background: var(--accent) !important;
        opacity: 1;
      }

      .pane-splitter.dragging {
        opacity: 1;
      }

      /* ── 状态栏 ── */
      #status-bar {
        display: flex;
        align-items: center;
        height: 24px;
        background: var(--statusbar-bg);
        color: var(--statusbar-fg);
        padding: 0 0 0 8px;
        font-size: 12px;
        flex-shrink: 0;
        transition: background 0.2s ease, color 0.2s ease;
      }

      #status-bar .status-left {
        flex: 1;
        display: flex;
        align-items: center;
        height: 100%;
      }

      #status-bar .status-right {
        display: flex;
        align-items: center;
        height: 100%;
      }

      #status-bar .status-item {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 100%;
        padding: 0 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      #status-bar .status-icon {
        font-size: 10px;
        color: var(--statusbar-accent);
      }

      #status-bar .status-clickable {
        cursor: pointer;
        transition: background 0.15s ease;
      }

      #status-bar .status-clickable:hover {
        background: var(--statusbar-hover);
      }

      #status-bar .status-separator {
        width: 1px;
        height: 12px;
        background: var(--statusbar-separator);
        margin: 0 2px;
      }

      /* ── 加载画面 ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-base);
        color: var(--text-loading);
        font-size: 14px;
        z-index: 200;
      }

      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .loading-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border-default);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .loading-text {
        font-size: 13px;
        color: var(--text-loading);
        letter-spacing: 0.3px;
      }

      #loading.hidden {
        display: none;
      }

      /* ── 确认对话框 ── */
      #confirm-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 400;
      }

      #confirm-overlay.visible {
        display: flex;
      }

      #confirm-dialog {
        background: var(--bg-elevated);
        border: 1px solid var(--border-default);
        border-radius: 6px;
        width: 400px;
        box-shadow: var(--shadow-dialog);
        animation: dialog-in 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #confirm-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border-default);
      }

      #confirm-header h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-bright);
      }

      #confirm-body {
        padding: 16px 20px;
        font-size: 13px;
        color: var(--text-primary);
        line-height: 1.5;
      }

      #confirm-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid var(--border-default);
      }

      /* ── 通知提示 ── */
      #notification {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 10px 14px;
        font-size: 13px;
        color: var(--text-primary);
        box-shadow: var(--shadow-notification);
        z-index: 500;
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
        max-width: 320px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #notification.visible {
        transform: translateX(0);
        opacity: 1;
      }

      #notification.info {
        border-left: 3px solid var(--accent);
      }

      #notification.error {
        border-left: 3px solid var(--color-error);
      }

      #notification.warning {
        border-left: 3px solid var(--color-warning);
      }

      #notification.success {
        border-left: 3px solid var(--color-success);
      }

      .notification-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }

      #notification.info .notification-icon {
        color: var(--accent);
      }

      #notification.error .notification-icon {
        color: var(--color-error);
      }

      #notification.warning .notification-icon {
        color: var(--color-warning);
      }

      #notification.success .notification-icon {
        color: var(--color-success);
      }

      .notification-text {
        flex: 1;
      }

      /* ── 设置对话框 ── */
      #settings-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 300;
      }

      #settings-overlay.visible {
        display: flex;
      }

      #settings-dialog {
        background: var(--bg-elevated);
        border: 1px solid var(--border-default);
        border-radius: 6px;
        width: 480px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: var(--shadow-dialog);
        animation: dialog-in 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #settings-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border-default);
      }

      #settings-header h2 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-bright);
      }

      #settings-close {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        line-height: 1;
        transition: background 0.1s ease, color 0.1s ease;
      }

      #settings-close:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      #settings-body {
        padding: 16px 20px;
      }

      .settings-group {
        margin-bottom: 16px;
      }

      .settings-group:last-child {
        margin-bottom: 0;
      }

      .settings-group-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 10px;
      }

      .settings-row {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      .settings-row:last-child {
        margin-bottom: 0;
      }

      .settings-label {
        width: 120px;
        font-size: 13px;
        color: var(--text-primary);
        flex-shrink: 0;
      }

      .settings-input {
        flex: 1;
        background: var(--bg-base);
        border: 1px solid var(--border-default);
        border-radius: 2px;
        padding: 4px 8px;
        font-size: 13px;
        color: var(--text-primary);
        font-family: inherit;
        transition: border-color 0.1s ease;
        height: 26px;
      }

      .settings-input:focus {
        outline: none;
        border-color: var(--accent);
      }

      select.settings-input {
        cursor: pointer;
        height: 26px;
      }

      #settings-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid var(--border-default);
      }

      .settings-btn {
        padding: 4px 14px;
        font-size: 13px;
        border-radius: 2px;
        cursor: pointer;
        border: 1px solid var(--border-default);
        font-family: inherit;
        height: 26px;
        transition: background 0.1s ease, color 0.1s ease, border-color 0.1s ease;
      }

      .settings-btn-primary {
        background: var(--accent);
        color: #ffffff;
        border-color: var(--accent);
      }

      .settings-btn-primary:hover {
        background: var(--accent-hover);
      }

      .settings-btn-secondary {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .settings-btn-secondary:hover {
        background: var(--bg-hover);
      }

      .settings-btn-danger {
        background: var(--color-error-bg-strong);
        color: var(--color-error);
        border-color: var(--color-error);
      }

      .settings-btn-danger:hover {
        background: var(--color-error-bg-hover);
      }

      /* ── 主题选择器 ── */
      .theme-picker {
        display: flex;
        gap: 8px;
        flex: 1;
      }

      .theme-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border: 1px solid var(--border-default);
        border-radius: 4px;
        background: var(--bg-base);
        color: var(--text-primary);
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        transition: border-color 0.1s ease, background 0.1s ease;
      }

      .theme-option:hover {
        border-color: var(--text-muted);
      }

      .theme-option.active {
        border-color: var(--accent);
        background: var(--bg-hover);
      }

      .theme-preview {
        width: 20px;
        height: 14px;
        border-radius: 2px;
        border: 1px solid var(--border-default);
      }

      .theme-preview-dark {
        background: linear-gradient(135deg, #1e1e1e 50%, #2d2d2d 50%);
      }

      .theme-preview-light {
        background: linear-gradient(135deg, #ffffff 50%, #f3f3f3 50%);
      }

      /* ── 焦点环（可访问性） ── */
      button:focus-visible,
      .settings-input:focus-visible,
      .theme-option:focus-visible,
      .project-action-btn:focus-visible,
      .tab:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }

      /* ── 动画关键帧 ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes dialog-in {
        from {
          opacity: 0;
          transform: scale(0.97) translateY(-4px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在初始化终端...</div>
      </div>
    </div>

    <div id="app">
      <div id="tab-bar">
        <button id="tab-add" title="新建标签 (Ctrl+T)">+</button>
      </div>

      <div id="main">
        <!-- 活动栏 -->
        <div id="activity-bar">
          <button class="activity-btn active" id="btn-toggle-sidebar" title="资源管理器">
            <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor">
              <path d="M14 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 13V3h4v10H2zm5 0V3h7v10H7z"/>
            </svg>
          </button>
          <div class="activity-spacer"></div>
          <button class="activity-btn" id="btn-open-settings" title="设置">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
              <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
            </svg>
          </button>
        </div>

        <!-- 侧边栏 -->
        <div id="sidebar">
          <div id="sidebar-header">
            <span>资源管理器</span>
            <div class="sidebar-actions">
              <button id="btn-add-project" title="添加项目目录">+</button>
            </div>
          </div>
          <div id="project-list"></div>
        </div>

        <!-- 终端区域 -->
        <div id="terminal-container"></div>
      </div>

      <div id="status-bar">
        <div class="status-left">
          <span id="status-shell" class="status-item">
            <span class="status-icon">&#9654;</span>
            <span>PowerShell</span>
          </span>
          <span class="status-separator"></span>
          <span id="status-cwd" class="status-item">
            <span>~</span>
          </span>
        </div>
        <div class="status-right">
          <span id="status-panes" class="status-item">1 个面板</span>
          <span class="status-separator"></span>
          <span id="status-encoding" class="status-item">UTF-8</span>
          <span class="status-separator"></span>
          <span id="status-theme-toggle" class="status-item status-clickable" title="切换主题">深色</span>
        </div>
      </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirm-overlay">
      <div id="confirm-dialog">
        <div id="confirm-header">
          <h3 id="confirm-title">确认</h3>
        </div>
        <div id="confirm-body"></div>
        <div id="confirm-footer">
          <button class="settings-btn settings-btn-secondary" id="confirm-cancel">取消</button>
          <button class="settings-btn settings-btn-danger" id="confirm-ok">确认</button>
        </div>
      </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification"></div>

    <!-- 设置对话框 -->
    <div id="settings-overlay">
      <div id="settings-dialog">
        <div id="settings-header">
          <h2>设置</h2>
          <button id="settings-close">&times;</button>
        </div>
        <div id="settings-body">
          <div class="settings-group">
            <div class="settings-group-title">外观</div>
            <div class="settings-row">
              <span class="settings-label">主题</span>
              <div class="theme-picker">
                <button class="theme-option active" data-theme="dark">
                  <span class="theme-preview theme-preview-dark"></span>
                  <span>深色</span>
                </button>
                <button class="theme-option" data-theme="light">
                  <span class="theme-preview theme-preview-light"></span>
                  <span>浅色</span>
                </button>
              </div>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-group-title">终端</div>
            <div class="settings-row">
              <span class="settings-label">默认 Shell</span>
              <input type="text" id="setting-shell" class="settings-input" placeholder="powershell.exe">
            </div>
            <div class="settings-row">
              <span class="settings-label">默认目录</span>
              <input type="text" id="setting-cwd" class="settings-input" placeholder="留空使用系统默认">
            </div>
            <div class="settings-row">
              <span class="settings-label">字体大小</span>
              <input type="number" id="setting-font-size" class="settings-input" min="8" max="32" step="1">
            </div>
            <div class="settings-row">
              <span class="settings-label">滚动缓冲</span>
              <input type="number" id="setting-scrollback" class="settings-input" min="100" max="100000" step="100">
            </div>
          </div>
        </div>
        <div id="settings-footer">
          <button class="settings-btn settings-btn-secondary" id="settings-cancel">取消</button>
          <button class="settings-btn settings-btn-primary" id="settings-save">保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
