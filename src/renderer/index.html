<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>终端管理器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e;
        font-family: 'Segoe UI', 'Microsoft YaHei', 'Cascadia Code', Consolas, monospace;
        color: #cccccc;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ── 主内容区 ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── 侧边栏 ── */
      #sidebar {
        width: 220px;
        background: #252526;
        border-right: 1px solid #3c3c3c;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }

      #sidebar.collapsed {
        width: 0;
        border-right: none;
      }

      #sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #bbbbbb;
        border-bottom: 1px solid #3c3c3c;
        flex-shrink: 0;
      }

      #sidebar-header button {
        background: transparent;
        border: none;
        color: #969696;
        font-size: 16px;
        cursor: pointer;
        padding: 0 4px;
        border-radius: 3px;
        line-height: 1;
      }

      #sidebar-header button:hover {
        background: #3c3c3c;
        color: #cccccc;
      }

      #project-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }

      #project-list::-webkit-scrollbar {
        width: 6px;
      }

      #project-list::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 3px;
      }

      .project-item {
        display: flex;
        align-items: center;
        padding: 4px 12px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        position: relative;
      }

      .project-item:hover {
        background: #2a2d2e;
      }

      .project-item .project-icon {
        margin-right: 6px;
        font-size: 14px;
        flex-shrink: 0;
      }

      .project-item .project-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-item .project-path {
        display: none;
        font-size: 11px;
        color: #888;
        padding: 2px 12px 4px 32px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-item .project-actions {
        display: none;
        gap: 2px;
      }

      .project-item:hover .project-actions {
        display: flex;
      }

      .project-action-btn {
        background: transparent;
        border: none;
        color: #969696;
        font-size: 13px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 3px;
        line-height: 1;
      }

      .project-action-btn:hover {
        background: #505050;
        color: #cccccc;
      }

      .project-action-btn.danger:hover {
        background: #5a1d1d;
        color: #f44747;
      }

      #sidebar-empty {
        padding: 16px 12px;
        font-size: 12px;
        color: #888;
        text-align: center;
      }

      /* ── 标签栏 ── */
      #tab-bar {
        display: flex;
        align-items: flex-end;
        height: 36px;
        background: #252526;
        padding: 0 8px;
        overflow-x: auto;
        overflow-y: hidden;
        flex-shrink: 0;
      }

      #tab-bar::-webkit-scrollbar {
        height: 3px;
      }

      #tab-bar::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 2px;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 12px;
        font-size: 12px;
        color: #969696;
        background: #2d2d2d;
        border: 1px solid #3c3c3c;
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
        transition: background 0.1s;
      }

      .tab:hover {
        background: #383838;
      }

      .tab.active {
        background: #1e1e1e;
        color: #ffffff;
        border-bottom-color: #1e1e1e;
        margin-bottom: -1px;
      }

      .tab-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        font-size: 15px;
        line-height: 1;
        opacity: 0;
        transition: opacity 0.1s, background 0.1s;
      }

      .tab:hover .tab-close {
        opacity: 0.6;
      }

      .tab-close:hover {
        opacity: 1 !important;
        background: #505050;
      }

      #tab-add {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        color: #969696;
        font-size: 18px;
        cursor: pointer;
        border-radius: 4px;
        flex-shrink: 0;
      }

      #tab-add:hover {
        background: #3c3c3c;
        color: #cccccc;
      }

      /* ── 终端区域 ── */
      #terminal-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .tab-content {
        position: absolute;
        inset: 0;
      }

      /* ── Pane 样式 ── */
      .pane {
        width: 100%;
        height: 100%;
        position: relative;
        border: 2px solid transparent;
        transition: border-color 0.15s;
      }

      .pane.focused {
        border-color: #007acc;
        box-shadow: inset 0 0 0 1px rgba(0, 120, 204, 0.3);
      }

      .pane:not(.focused) {
        opacity: 0.85;
      }

      .pane .xterm {
        height: 100%;
      }

      .pane .xterm-viewport {
        overflow-y: auto !important;
      }

      /* ── 布局容器 ── */
      .layout-container {
        width: 100%;
        height: 100%;
      }

      .layout-child {
        position: relative;
        overflow: hidden;
      }

      /* ── 分割线 ── */
      .pane-splitter {
        flex-shrink: 0;
        position: relative;
        z-index: 10;
      }

      /* ── 状态栏 ── */
      #status-bar {
        display: flex;
        align-items: center;
        height: 22px;
        background: #007acc;
        color: #ffffff;
        padding: 0 10px;
        font-size: 12px;
        flex-shrink: 0;
      }

      #status-bar .status-left {
        flex: 1;
        display: flex;
        gap: 16px;
      }

      #status-bar .status-right {
        display: flex;
        gap: 16px;
      }

      /* ── 加载画面 ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e1e;
        color: #d4d4d4;
        font-size: 14px;
        z-index: 200;
      }

      #loading.hidden {
        display: none;
      }

      /* ── 确认对话框 ── */
      #confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 400;
      }

      #confirm-overlay.visible {
        display: flex;
      }

      #confirm-dialog {
        background: #2d2d2d;
        border: 1px solid #3c3c3c;
        border-radius: 8px;
        width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      #confirm-header {
        padding: 16px 20px;
        border-bottom: 1px solid #3c3c3c;
      }

      #confirm-header h3 {
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
      }

      #confirm-body {
        padding: 20px;
        font-size: 13px;
        color: #cccccc;
        line-height: 1.5;
      }

      #confirm-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 16px 20px;
        border-top: 1px solid #3c3c3c;
      }

      /* ── 通知提示 ── */
      #notification {
        position: fixed;
        top: 16px;
        right: 16px;
        background: #3c3c3c;
        border: 1px solid #505050;
        border-radius: 6px;
        padding: 12px 16px;
        font-size: 13px;
        color: #cccccc;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        z-index: 500;
        transform: translateX(120%);
        transition: transform 0.3s ease;
        max-width: 320px;
      }

      #notification.visible {
        transform: translateX(0);
      }

      #notification.error {
        border-color: #f44747;
        background: #3a1d1d;
      }

      #notification.warning {
        border-color: #d7ba7d;
        background: #3a3a1d;
      }

      #notification.success {
        border-color: #6a9955;
        background: #1d3a1d;
      }

      /* ── 设置对话框 ── */
      #settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 300;
      }

      #settings-overlay.visible {
        display: flex;
      }

      #settings-dialog {
        background: #2d2d2d;
        border: 1px solid #3c3c3c;
        border-radius: 8px;
        width: 480px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      #settings-dialog::-webkit-scrollbar {
        width: 6px;
      }

      #settings-dialog::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 3px;
      }

      #settings-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #3c3c3c;
      }

      #settings-header h2 {
        font-size: 16px;
        font-weight: 600;
        color: #ffffff;
      }

      #settings-close {
        background: transparent;
        border: none;
        color: #969696;
        font-size: 20px;
        cursor: pointer;
        padding: 0 4px;
        border-radius: 4px;
        line-height: 1;
      }

      #settings-close:hover {
        background: #505050;
        color: #cccccc;
      }

      #settings-body {
        padding: 20px;
      }

      .settings-group {
        margin-bottom: 20px;
      }

      .settings-group:last-child {
        margin-bottom: 0;
      }

      .settings-group-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #bbbbbb;
        margin-bottom: 12px;
      }

      .settings-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }

      .settings-row:last-child {
        margin-bottom: 0;
      }

      .settings-label {
        width: 120px;
        font-size: 13px;
        color: #cccccc;
        flex-shrink: 0;
      }

      .settings-input {
        flex: 1;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 13px;
        color: #cccccc;
        font-family: inherit;
      }

      .settings-input:focus {
        outline: none;
        border-color: #007acc;
      }

      select.settings-input {
        cursor: pointer;
      }

      #settings-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 16px 20px;
        border-top: 1px solid #3c3c3c;
      }

      .settings-btn {
        padding: 6px 16px;
        font-size: 13px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid #3c3c3c;
        font-family: inherit;
      }

      .settings-btn-primary {
        background: #007acc;
        color: #ffffff;
        border-color: #007acc;
      }

      .settings-btn-primary:hover {
        background: #005a9e;
      }

      .settings-btn-secondary {
        background: #3c3c3c;
        color: #cccccc;
      }

      .settings-btn-secondary:hover {
        background: #505050;
      }

      .settings-btn-danger {
        background: #5a1d1d;
        color: #f44747;
        border-color: #f44747;
      }

      .settings-btn-danger:hover {
        background: #7a2d2d;
      }
    </style>
  </head>
  <body>
    <div id="loading">正在初始化终端...</div>

    <div id="app">
      <div id="tab-bar">
        <button id="tab-add" title="新建标签 (Ctrl+T)">＋</button>
      </div>

      <div id="main">
        <!-- 侧边栏 -->
        <div id="sidebar">
          <div id="sidebar-header">
            <span>项目</span>
            <button id="btn-add-project" title="添加项目目录">＋</button>
          </div>
          <div id="project-list"></div>
        </div>

        <!-- 终端区域 -->
        <div id="terminal-container"></div>
      </div>

      <div id="status-bar">
        <div class="status-left">
          <span id="status-shell">PowerShell</span>
          <span id="status-cwd">~</span>
        </div>
        <div class="status-right">
          <span>UTF-8</span>
        </div>
      </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirm-overlay">
      <div id="confirm-dialog">
        <div id="confirm-header">
          <h3 id="confirm-title">确认</h3>
        </div>
        <div id="confirm-body"></div>
        <div id="confirm-footer">
          <button class="settings-btn settings-btn-secondary" id="confirm-cancel">取消</button>
          <button class="settings-btn settings-btn-danger" id="confirm-ok">确认</button>
        </div>
      </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification"></div>

    <!-- 设置对话框 -->
    <div id="settings-overlay">
      <div id="settings-dialog">
        <div id="settings-header">
          <h2>设置</h2>
          <button id="settings-close">×</button>
        </div>
        <div id="settings-body">
          <div class="settings-group">
            <div class="settings-group-title">终端</div>
            <div class="settings-row">
              <span class="settings-label">默认 Shell</span>
              <input type="text" id="setting-shell" class="settings-input" placeholder="powershell.exe">
            </div>
            <div class="settings-row">
              <span class="settings-label">默认目录</span>
              <input type="text" id="setting-cwd" class="settings-input" placeholder="留空使用系统默认">
            </div>
            <div class="settings-row">
              <span class="settings-label">字体大小</span>
              <input type="number" id="setting-font-size" class="settings-input" min="8" max="32" step="1">
            </div>
            <div class="settings-row">
              <span class="settings-label">滚动缓冲</span>
              <input type="number" id="setting-scrollback" class="settings-input" min="100" max="100000" step="100">
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-group-title">外观</div>
            <div class="settings-row">
              <span class="settings-label">主题</span>
              <select id="setting-theme" class="settings-input">
                <option value="dark">深色</option>
                <option value="light">浅色</option>
              </select>
            </div>
          </div>
        </div>
        <div id="settings-footer">
          <button class="settings-btn settings-btn-secondary" id="settings-cancel">取消</button>
          <button class="settings-btn settings-btn-primary" id="settings-save">保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
