name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact: windows-x64
          - os: macos-13
            script: package:mac:x64
            artifact: macos-x64
          - os: macos-latest
            script: package:mac:arm64
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: terminal-manager-${{ matrix.artifact }}
          path: dist/
